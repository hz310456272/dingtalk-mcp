server:
  name: dingtalk-knowledge
  description: 钉钉知识库
tools:
  # ========== 知识库管理（Wiki.Workspace.Read / Wiki.Workspace.Write）==========

  - name: listKnowledgeWorkspaces
    description: |
      查询用户有权限的知识库列表。
      返回用户可访问的所有知识库，包括知识库名称、ID、类型、URL等基本信息。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/workspaces?operatorId=String&maxResults=Integer&nextToken=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: maxResults
        description: 每页返回的数据条数，默认50，最大50。
        type: integer
        required: false
        position: query
      - name: nextToken
        description: 分页游标。首次不传，后续从上次返回结果获取。
        type: string
        required: false
        position: query

  - name: getKnowledgeWorkspace
    description: |
      获取单个知识库的详细信息，包括名称、描述、类型、根节点ID等。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/workspaces/{workspaceId}?operatorId=String&withPermissionRole=Boolean
    args:
      - name: workspaceId
        description: 知识库ID，从listKnowledgeWorkspaces获取。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: withPermissionRole
        description: 是否获取权限信息，默认false。
        type: boolean
        required: false
        position: query

  - name: batchGetKnowledgeWorkspaces
    description: |
      批量获取知识库信息。根据多个知识库ID，批量返回知识库详情。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/workspaces/batchGet?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: workspaceIds
        description: 知识库ID列表，从listKnowledgeWorkspaces获取。
        type: array
        required: true
        position: body
        items:
          type: string

  - name: getMyDocuments
    description: |
      获取"我的文档"知识库信息。返回当前用户的个人文档知识库。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/mineWorkspaces?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query

  - name: createKnowledgeWorkspace
    description: |
      新建知识库。创建一个新的企业知识库。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/workspaces?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: name
        description: 知识库名称。
        type: string
        required: true
        position: body
      - name: description
        description: 知识库描述（可选）。
        type: string
        required: false
        position: body

  - name: searchKnowledgeBase
    description: |
      搜索知识库。根据关键词搜索用户有权限的知识库，返回匹配的知识库名称和ID。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/workspaces/search?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: keyword
        description: 搜索关键词。
        type: string
        required: true
        position: body
      - name: nextToken
        description: 分页游标，首次不传。
        type: string
        required: false
        position: body
      - name: maxResults
        description: 分页大小，默认20，最大20。
        type: integer
        required: false
        position: body

  # ========== 节点管理（Wiki.Node.Read / Document.WorkspaceDocument.Read）==========

  - name: listKnowledgeNodes
    description: |
      获取知识库节点列表（浏览目录树）。根据父节点ID查询子节点。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/nodes?parentNodeId=String&operatorId=String&nextToken=String&maxResults=Integer&withPermissionRole=Boolean
    args:
      - name: parentNodeId
        description: 父节点ID（dentryUuid）。根目录用rootNodeId。
        type: string
        required: true
        position: query
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: nextToken
        description: 分页游标，首次不传。
        type: string
        required: false
        position: query
      - name: maxResults
        description: 每页数据条数，默认50，最大50。
        type: integer
        required: false
        position: query
      - name: withPermissionRole
        description: 是否获取权限信息，默认false。
        type: boolean
        required: false
        position: query

  - name: getKnowledgeNode
    description: |
      获取单个知识库节点的详细信息。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/nodes/{nodeId}?operatorId=String
    args:
      - name: nodeId
        description: 节点ID（dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query

  - name: getKnowledgeNodeByLink
    description: |
      通过文档链接获取节点信息。传入钉钉文档URL，返回该文档对应的节点详情（nodeId、workspaceId等）。

      【使用场景】
      - 用户给你一个钉钉文档链接，你用此接口解析出nodeId
      - 配合getKnowledgeNode获取文档详细信息
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/nodes/getByLink?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: url
        description: 钉钉文档链接URL，如 https://alidocs.dingtalk.com/i/nodes/xxx
        type: string
        required: true
        position: body
      - name: withStatisticalInfo
        description: 是否获取统计信息，默认false。
        type: boolean
        required: false
        position: body
      - name: withPermissionRole
        description: 是否获取权限信息，默认false。
        type: boolean
        required: false
        position: body

  - name: batchGetKnowledgeNodes
    description: |
      批量获取节点信息。根据多个节点ID，批量返回节点详情。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/nodes/batchGet?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: nodeIds
        description: 节点ID列表（dentryUuid）。
        type: array
        required: true
        position: body
        items:
          type: string
      - name: withStatisticalInfo
        description: 是否获取统计信息，默认false。
        type: boolean
        required: false
        position: body
      - name: withPermissionRole
        description: 是否获取权限信息，默认false。
        type: boolean
        required: false
        position: body

  # ========== 文档操作（Document.WorkspaceDocument.Write）==========

  - name: createKnowledgeDocument
    description: |
      在知识库中创建文档或文件夹。支持DOC（文字）、WORKBOOK（表格）、MIND（脑图）、FOLDER（文件夹）。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v1.0/doc/workspaces/{workspaceId}/docs
    args:
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: path
      - name: name
        description: 文档名称。
        type: string
        required: true
        position: body
      - name: docType
        description: 文档类型：DOC/WORKBOOK/MIND/FOLDER。
        type: string
        required: true
        position: body
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: body
      - name: parentNodeId
        description: 父节点ID（可选），不传则在根目录创建。
        type: string
        required: false
        position: body

  - name: addKnowledgeDocumentMember
    description: |
      添加知识库文档成员，给用户或部门授予文档权限。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v1.0/doc/workspaces/{workspaceId}/docs/{docId}/members
    args:
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: path
      - name: docId
        description: 文档ID（dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: body
      - name: members
        description: |
          成员列表，每个成员包含：
          - memberId: 用户unionId或部门ID
          - memberType: USER或DEPT
          - roleType: ONLY_VIEWER(只读) / VIEWER(可查看下载) / EDITOR(可编辑)
        type: array
        required: true
        position: body
        items:
          type: object
          required:
            - memberId
            - memberType
            - roleType
          properties:
            memberId:
              type: string
              description: 用户unionId（memberType=USER）或部门ID（memberType=DEPT）
            memberType:
              type: string
              description: USER或DEPT
            roleType:
              type: string
              description: ONLY_VIEWER / VIEWER / EDITOR

  - name: updateKnowledgeDocumentMember
    description: |
      修改知识库文档成员的权限。
    requestTemplate:
      method: PUT
      url: https://api.dingtalk.com/v1.0/doc/workspaces/{workspaceId}/docs/{docId}/members
    args:
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: path
      - name: docId
        description: 文档ID（dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: body
      - name: members
        description: 成员列表，格式同addKnowledgeDocumentMember。
        type: array
        required: true
        position: body
        items:
          type: object
          properties:
            memberId:
              type: string
            memberType:
              type: string
            roleType:
              type: string

  - name: deleteKnowledgeDocumentMember
    description: |
      删除知识库文档成员，移除用户对文档的权限。
    requestTemplate:
      method: DELETE
      url: https://api.dingtalk.com/v1.0/doc/workspaces/{workspaceId}/docs/{docId}/members?operatorId=String
    args:
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: path
      - name: docId
        description: 文档ID（dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: members
        description: 要删除的成员列表。
        type: array
        required: true
        position: body
        items:
          type: object
          properties:
            memberId:
              type: string
            memberType:
              type: string

  # ========== 文档内容（Document.WorkspaceDocument.Read）==========

  - name: exportKnowledgeDocument
    description: |
      导出知识库文档内容为Markdown格式。
      返回导出结果，可用于读取文档正文内容。

      【使用场景】
      - 读取知识库文档的实际正文内容
      - 将钉钉文档导出为Markdown格式

      【前置条件】
      需要Document.WorkspaceDocument.Read权限。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v1.0/doc/{dentryUuid}/export?operatorId=String&targetFormat=String
    args:
      - name: dentryUuid
        description: 文档的dentryUuid，从getKnowledgeNode或listKnowledgeNodes获取。也可以从文档URL中提取。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: targetFormat
        description: 导出格式，支持 markdown。
        type: string
        required: false
        position: query
