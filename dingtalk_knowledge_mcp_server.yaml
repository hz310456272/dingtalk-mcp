server:
  name: dingtalk-knowledge
  description: 钉钉知识库
tools:
  # ========== 知识库管理（Wiki.Workspace.Read / Wiki.Workspace.Write）==========

  - name: listKnowledgeWorkspaces
    description: |
      查询用户有权限的知识库列表。
      返回用户可访问的所有知识库，包括知识库名称、ID、类型、URL等基本信息。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/workspaces?operatorId=String&maxResults=Integer&nextToken=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: maxResults
        description: 每页返回的数据条数，默认50，最大50。
        type: integer
        required: false
        position: query
      - name: nextToken
        description: 分页游标。首次不传，后续从上次返回结果获取。
        type: string
        required: false
        position: query

  - name: getKnowledgeWorkspace
    description: |
      获取单个知识库的详细信息，包括名称、描述、类型、根节点ID等。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/workspaces/{workspaceId}?operatorId=String&withPermissionRole=Boolean
    args:
      - name: workspaceId
        description: 知识库ID，从listKnowledgeWorkspaces获取。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: withPermissionRole
        description: 是否获取权限信息，默认false。
        type: boolean
        required: false
        position: query

  - name: batchGetKnowledgeWorkspaces
    description: |
      批量获取知识库信息。根据多个知识库ID，批量返回知识库详情。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/workspaces/batchGet?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: workspaceIds
        description: 知识库ID列表，从listKnowledgeWorkspaces获取。
        type: array
        required: true
        position: body
        items:
          type: string

  - name: getMyDocuments
    description: |
      获取"我的文档"知识库信息。返回当前用户的个人文档知识库。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/mineWorkspaces?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query

  - name: createKnowledgeWorkspace
    description: |
      新建知识库。创建一个新的企业知识库。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/workspaces?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: name
        description: 知识库名称。
        type: string
        required: true
        position: body
      - name: description
        description: 知识库描述（可选）。
        type: string
        required: false
        position: body

  # ========== 节点管理（Wiki.Node.Read / Document.WorkspaceDocument.Read）==========

  - name: listKnowledgeNodes
    description: |
      获取知识库节点列表（浏览目录树）。根据父节点ID查询子节点。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/nodes?parentNodeId=String&operatorId=String&nextToken=String&maxResults=Integer&withPermissionRole=Boolean
    args:
      - name: parentNodeId
        description: 父节点ID（dentryUuid）。根目录用rootNodeId。
        type: string
        required: true
        position: query
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: nextToken
        description: 分页游标，首次不传。
        type: string
        required: false
        position: query
      - name: maxResults
        description: 每页数据条数，默认50，最大50。
        type: integer
        required: false
        position: query
      - name: withPermissionRole
        description: 是否获取权限信息，默认false。
        type: boolean
        required: false
        position: query

  - name: getKnowledgeNode
    description: |
      获取单个知识库节点的详细信息。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2.0/wiki/nodes/{nodeId}?operatorId=String
    args:
      - name: nodeId
        description: 节点ID（dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query

  - name: getKnowledgeNodeByLink
    description: |
      通过文档链接获取节点信息。传入钉钉文档URL，返回该文档对应的节点详情（nodeId、workspaceId等）。

      【使用场景】
      - 用户给你一个钉钉文档链接，你用此接口解析出nodeId
      - 配合getKnowledgeNode获取文档详细信息
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/nodes/queryByUrl?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: url
        description: 钉钉文档链接URL，如 https://alidocs.dingtalk.com/i/nodes/xxx
        type: string
        required: true
        position: body
      - name: withStatisticalInfo
        description: 是否获取统计信息，默认false。
        type: boolean
        required: false
        position: body
      - name: withPermissionRole
        description: 是否获取权限信息，默认false。
        type: boolean
        required: false
        position: body

  - name: batchGetKnowledgeNodes
    description: |
      批量获取节点信息。根据多个节点ID，批量返回节点详情。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/nodes/batchQuery?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: nodeIds
        description: 节点ID列表（dentryUuid）。
        type: array
        required: true
        position: body
        items:
          type: string
      - name: withStatisticalInfo
        description: 是否获取统计信息，默认false。
        type: boolean
        required: false
        position: body
      - name: withPermissionRole
        description: 是否获取权限信息，默认false。
        type: boolean
        required: false
        position: body

  # ========== 文档操作（Document.WorkspaceDocument.Write）==========

  - name: createKnowledgeDocument
    description: |
      在知识库中创建文档或文件夹。支持DOC（文字）、WORKBOOK（表格）、MIND（脑图）、FOLDER（文件夹）。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v1.0/doc/workspaces/{workspaceId}/docs
    args:
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: path
      - name: name
        description: 文档名称。
        type: string
        required: true
        position: body
      - name: docType
        description: 文档类型：DOC/WORKBOOK/MIND/FOLDER。
        type: string
        required: true
        position: body
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: body
      - name: parentNodeId
        description: 父节点ID（可选），不传则在根目录创建。
        type: string
        required: false
        position: body

  - name: addKnowledgeDocumentMember
    description: |
      添加知识库文档成员，给用户或部门授予文档权限。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v1.0/doc/workspaces/{workspaceId}/docs/{docId}/members
    args:
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: path
      - name: docId
        description: 文档ID（dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: body
      - name: members
        description: |
          成员列表，每个成员包含：
          - memberId: 用户unionId或部门ID
          - memberType: USER或DEPT
          - roleType: ONLY_VIEWER(只读) / VIEWER(可查看下载) / EDITOR(可编辑)
        type: array
        required: true
        position: body
        items:
          type: object
          required:
            - memberId
            - memberType
            - roleType
          properties:
            memberId:
              type: string
              description: 用户unionId（memberType=USER）或部门ID（memberType=DEPT）
            memberType:
              type: string
              description: USER或DEPT
            roleType:
              type: string
              description: ONLY_VIEWER / VIEWER / EDITOR

  - name: updateKnowledgeDocumentMember
    description: |
      修改知识库文档成员的权限。
    requestTemplate:
      method: PUT
      url: https://api.dingtalk.com/v1.0/doc/workspaces/{workspaceId}/docs/{docId}/members
    args:
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: path
      - name: docId
        description: 文档ID（dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: body
      - name: members
        description: 成员列表，格式同addKnowledgeDocumentMember。
        type: array
        required: true
        position: body
        items:
          type: object
          properties:
            memberId:
              type: string
            memberType:
              type: string
            roleType:
              type: string

  - name: deleteKnowledgeDocumentMember
    description: |
      删除知识库文档成员，移除用户对文档的权限。
    requestTemplate:
      method: DELETE
      url: https://api.dingtalk.com/v1.0/doc/workspaces/{workspaceId}/docs/{docId}/members?operatorId=String
    args:
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: path
      - name: docId
        description: 文档ID（dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: members
        description: 要删除的成员列表。
        type: array
        required: true
        position: body
        items:
          type: object
          properties:
            memberId:
              type: string
            memberType:
              type: string

  # ========== 文档内容操作（Storage.File.Read / Storage.File.Write）==========

  - name: queryDocumentBlocks
    description: |
      查询钉钉文档的块元素列表（文档内容）。传入文档 docKey 或 dentryUuid，返回文档根节点下的一级块元素列表，包含每个块的 blockId、blockType 和内容属性。

      【使用场景】
      - 读取钉钉文档内容，了解文档结构和内容
      - 获取 blockId 用于后续的块元素操作（更新、删除）
      - 配合 getKnowledgeNodeByLink 从 URL 解析出 nodeId/dentryUuid，再调用本接口读取内容

      【注意】目前仅支持查询文档根节点下的一级块元素，不支持递归查询嵌套在容器（高亮块、表格等）内的子块元素。
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v1.0/doc/suites/documents/{docKey}/blocks?operatorId=String
    args:
      - name: docKey
        description: 文档ID（docKey 或 dentryUuid）。从文档 URL 获取 dentryUuid，如 https://alidocs.dingtalk.com/i/nodes/Z9xxxxa-id 中的 Z9xxxxa-id；或从创建文档接口返回值获取 docKey。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的 unionId。
        type: string
        required: true
        position: query

  - name: overwriteDocumentContent
    description: |
      以 Markdown 格式覆写钉钉文档的整篇内容。此操作会清空文档现有全部内容后重写，属于破坏性操作，请谨慎使用。

      【使用场景】
      - 向空文档写入全新内容
      - 完整替换文档内容（需确认旧内容不再需要）

      【注意】
      - 如果只想追加内容而不破坏已有内容，请使用 insertDocumentContent 工具。
      - 最大写入长度为 50000 字符。
      - 需要企业存储文件写权限（Storage.File.Write）。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v1.0/doc/suites/documents/{docKey}/overwriteContent?operatorId=String
    args:
      - name: docKey
        description: 文档ID（docKey 或 dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的 unionId。
        type: string
        required: true
        position: query
      - name: dataType
        description: 覆写内容的数据格式，默认 markdown（目前仅支持 markdown）。
        type: string
        required: false
        position: body
        not_need_model_transform: true
        default: markdown
      - name: content
        description: 需要写入的 Markdown 格式内容字符串，最大长度 50000 字符。
        type: string
        required: true
        position: body

  - name: insertDocumentContent
    description: |
      在钉钉文档的指定位置插入一段 Markdown 内容（追加，不影响已有内容）。

      【使用场景】
      - 向文档末尾追加新内容（不提供 path 和 index 参数时默认追加到末尾）
      - 在文档指定位置插入段落、标题等内容（只提供 index 参数，如 index=2 表示插入到第 3 个块元素之前）

      【注意】
      - 需要企业存储文件写权限（Storage.File.Write）。
      - 插入位置：仅提供 index 时在根节点指定位置插入；仅提供 path 时进入容器块子级插入；两者都不提供时追加到末尾。
      - content 参数必须包含 type（固定填 "markdown"）和 content（Markdown 文本）两个字段。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v1.0/doc/suites/documents/{docKey}/content?operatorId=String
    args:
      - name: docKey
        description: 文档ID（docKey 或 dentryUuid）。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的 unionId。
        type: string
        required: true
        position: query
      - name: path
        description: 插入位置路径，用于进入容器块（如高亮块、表格）的子级。注意：在根节点插入只需 index 参数，不需要 path。
        type: array
        required: false
        position: body
        items:
          type: integer
      - name: index
        description: 插入位置索引（从 0 开始）。如 index=2 表示插入到第 3 个块元素之前。不提供时默认插入到末尾。
        type: integer
        required: false
        position: body
      - name: content
        description: 插入内容对象，包含类型和文本。
        type: object
        required: true
        position: body
        properties:
          type:
            type: string
            description: 内容类型，目前只支持 markdown
          content:
            type: string
            description: 插入的 Markdown 格式内容文本

  # ========== 文档块元素操作（Storage.File.Read / Storage.File.Write）==========

  - name: queryDocumentBlockChildren
    description: |
      查询文档块元素的子块列表。用于读取嵌套在容器块（如表格、高亮块）内部的子元素。

      【使用场景】
      - 用 queryDocumentBlocks 获取一级块后，发现某个块的 blockType 是容器类型（如表格、高亮块）
      - 用该块的 blockId 调用本接口，读取容器内部的子块内容
      - 实现递归读取文档完整内容：先读一级块，再逐个读容器块的子块

      【注意】需要企业存储文件读权限（Storage.File.Read）。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v1.0/doc/spaces/docs/blocks/children/query?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: docId
        description: 文档ID（docKey 或 dentryUuid）。
        type: string
        required: true
        position: body
      - name: blockId
        description: 父块元素ID。从 queryDocumentBlocks 返回结果的 blockId 字段获取。
        type: string
        required: true
        position: body
      - name: pageSize
        description: 每页返回数量，默认50，最大50。
        type: integer
        required: false
        position: body
      - name: pageToken
        description: 分页游标，首次不传。
        type: string
        required: false
        position: body

  - name: updateDocumentBlock
    description: |
      更新文档中的单个块元素内容。此操作会完全替换指定块的内容（非合并更新）。

      【使用场景】
      - 修改某个段落的文本内容
      - 更新标题、列表等块元素

      【注意】
      - block 参数为块元素完整内容对象，会完全替换原块内容
      - 需要企业存储文件写权限（Storage.File.Write）
    requestTemplate:
      method: PUT
      url: https://api.dingtalk.com/v1.0/doc/suites/blocks/{blockId}?operatorId=String
    args:
      - name: blockId
        description: 要更新的块元素ID。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: block
        description: |
          块元素内容对象，完全替换原块内容。结构示例：
          {"block_type": 1, "text": {"elements": [{"text_run": {"content": "更新的文本", "text_element_style": {}}}]}}
          block_type: 1=段落, 2=标题, 3=列表等
        type: object
        required: true
        position: body

  - name: deleteDocumentBlock
    description: |
      删除文档中的单个块元素。此操作不可恢复，请谨慎使用。

      【使用场景】
      - 删除文档中多余的段落、标题等

      【注意】
      - 删除不可恢复
      - 需要企业存储文件写权限（Storage.File.Write）
    requestTemplate:
      method: DELETE
      url: https://api.dingtalk.com/v1.0/doc/suites/blocks/{blockId}?operatorId=String
    args:
      - name: blockId
        description: 要删除的块元素ID。
        type: string
        required: true
        position: path
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query

  # ========== 知识库节点管理（Wiki.Workspace.Write）==========

  - name: moveKnowledgeNode
    description: |
      移动知识库节点到新的父节点下。可用于调整文档目录结构。

      【使用场景】
      - 将文档从一个文件夹移动到另一个文件夹
      - 调整知识库的目录组织结构
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/nodes/move?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: nodeId
        description: 要移动的节点ID（dentryUuid）。
        type: string
        required: true
        position: body
      - name: targetParentNodeId
        description: 目标父节点ID。移动后该节点会成为此父节点的子节点。
        type: string
        required: true
        position: body
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: body

  - name: renameKnowledgeNode
    description: |
      重命名知识库节点（修改文档或文件夹的标题）。

      【使用场景】
      - 修改文档标题
      - 重命名文件夹
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/nodes/rename?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: nodeId
        description: 要重命名的节点ID（dentryUuid）。
        type: string
        required: true
        position: body
      - name: title
        description: 新的标题名称。
        type: string
        required: true
        position: body
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: body

  - name: deleteKnowledgeNode
    description: |
      删除知识库节点（文档或文件夹）。此操作不可恢复，请谨慎使用。

      【使用场景】
      - 删除不再需要的文档
      - 删除空文件夹

      【注意】删除不可恢复，请确认后再操作。
    requestTemplate:
      method: POST
      url: https://api.dingtalk.com/v2.0/wiki/nodes/delete?operatorId=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: nodeId
        description: 要删除的节点ID（dentryUuid）。
        type: string
        required: true
        position: body
      - name: workspaceId
        description: 知识库ID。
        type: string
        required: true
        position: body

  # ========== 知识库文件下载（Storage.File.Read）==========

  - name: downloadKnowledgeFile
    description: |
      下载知识库中的上传型文件。返回一个临时下载链接（URL），有效期数小时。

      【使用场景】
      - 下载用户上传到知识库的 xlsx、pdf、图片等文件
      - 获取文件下载 URL 后可在本地读取文件内容

      【注意】
      - 仅支持下载**上传型文件**（dentry.type = file），不支持下载在线创建的文档（doc、sheet、mind）
      - 返回的是临时下载链接，需在有效期内使用
    requestTemplate:
      method: GET
      url: https://api.dingtalk.com/v2/storage/dentries/download?operatorId=String&dentryUuid=String
    args:
      - name: operatorId
        description: 操作人的unionId。
        type: string
        required: true
        position: query
      - name: dentryUuid
        description: 文件的 dentryUuid（节点ID）。仅支持上传型文件，不支持在线创建的文档。
        type: string
        required: true
        position: query

  